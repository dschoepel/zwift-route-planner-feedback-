title: "[Feature Request] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Before submitting, please search existing discussions to avoid duplicates — a 👍 on an existing post is the best way to show support for an idea.
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like to see added or improved?
      placeholder: Describe the feature you'd like...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why would this be useful?
      description: Explain how this feature would improve your experience planning Zwift routes.
      placeholder: I want this because...
    validations:
      required: false
