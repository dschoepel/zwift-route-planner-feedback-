title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible to help us reproduce and fix the issue.

        > **Note:** For route data corrections (wrong distance, elevation, etc.) please use the **Report a correction** link directly on the route card in the app instead.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 123 on macOS
    validations:
      required: false
